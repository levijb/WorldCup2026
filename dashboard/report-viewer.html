<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Report Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg-base: #0d1117;
    --bg-card: #161b22;
    --bg-item: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #6e7681;
    --accent-blue: #58a6ff;
    --accent-green: #00c853;
    --accent-red: #f85149;
    --accent-amber: #ffab00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-base); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
  a { color: var(--accent-blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Header ── */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-title { color: #fff; font-size: 16px; font-weight: 700; }

  /* ── Page Toggle ── */
  .page-toggle {
    display: inline-flex;
    background: var(--bg-item);
    border-radius: 8px;
    padding: 2px;
    gap: 2px;
  }
  .page-toggle a {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    color: var(--text-muted);
    transition: color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .page-toggle a:hover { color: var(--text-primary); text-decoration: none; }
  .page-toggle a.active { background: #1f6feb; color: #fff; }
  .page-toggle svg { flex-shrink: 0; }

  /* ── Back bar ── */
  .back-bar { max-width: 680px; margin: 0 auto; padding: 16px 24px 0; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
  }
  .back-link:hover { color: var(--accent-blue); text-decoration: none; }

  /* ── Report content ── */
  .report-wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 24px 64px;
  }

  .loading, .error-msg {
    padding: 40px 0;
    text-align: center;
    color: var(--text-dim);
    font-style: italic;
  }
  .error-msg {
    color: var(--accent-red);
    font-style: normal;
  }
  .error-msg a {
    display: inline-block;
    margin-top: 10px;
  }

  .report-body h1 {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
    margin-bottom: 16px;
  }
  .report-body h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent-blue);
    margin-top: 32px;
    margin-bottom: 10px;
  }
  .report-body h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-top: 22px;
    margin-bottom: 8px;
  }
  .report-body h4 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-top: 18px;
    margin-bottom: 6px;
  }
  .report-body p {
    line-height: 1.7;
    color: #c9d1d9;
    margin-bottom: 14px;
  }
  .report-body ul, .report-body ol {
    margin: 0 0 14px;
    padding-left: 22px;
  }
  .report-body li {
    line-height: 1.7;
    color: #c9d1d9;
    margin-bottom: 6px;
  }
  .report-body strong {
    color: #fff;
    font-weight: 700;
  }
  .report-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }
  .report-body a {
    color: var(--accent-blue);
  }
  .report-body code {
    background: var(--bg-item);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 13px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
  }
  .report-body pre {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    overflow-x: auto;
    margin-bottom: 14px;
  }
  .report-body pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.6;
    color: #c9d1d9;
  }

  /* Bet recommendation / parlay blocks: paragraphs starting with **BET:** or **Parlay N:** */
  .report-body .bet-block {
    border-left: 3px solid var(--accent-amber);
    border-radius: 0 6px 6px 0;
    background: var(--bg-card);
    padding: 12px 16px;
    margin-bottom: 14px;
  }
  .report-body .bet-block p,
  .report-body .bet-block ul {
    margin-bottom: 0;
  }
  .report-body .bet-block ul {
    margin-top: 8px;
  }

  /* Table of contents nav block — first <ul> right after the first <h2> */
  .report-body .toc {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px 10px 32px;
    margin-bottom: 24px;
  }
  .report-body .toc li {
    font-size: 13px;
    color: var(--text-muted);
  }
  .report-body .toc a {
    color: var(--text-muted);
  }
  .report-body .toc a:hover {
    color: var(--accent-blue);
    text-decoration: none;
  }

  @media (max-width: 480px) {
    .report-wrapper, .back-bar { padding-left: 14px; padding-right: 14px; }
    .report-body h1 { font-size: 20px; }
    .report-body h2 { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">World Cup 2026</span>
  <nav class="page-toggle">
    <a href="tournament.html">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 2h3v5H2zM11 2h3v5h-3z"/><path d="M5 4.5h6"/><path d="M8 7v3"/><path d="M5 13h6v-3H5z"/>
      </svg>
      Tournament
    </a>
    <a href="reports.html" class="active" aria-current="page">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 2h7l3 3v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/><path d="M5 6h6M5 9h6M5 12h4"/>
      </svg>
      Reports
    </a>
    <a href="index.html">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="1" y="9" width="3" height="6" rx="1"/><rect x="6" y="5" width="3" height="10" rx="1"/><rect x="11" y="1" width="3" height="14" rx="1"/>
      </svg>
      Odds
    </a>
  </nav>
</div>

<div class="back-bar">
  <a class="back-link" href="reports.html">&larr; All Reports</a>
</div>

<div class="report-wrapper">
  <div id="report-container"><div class="loading">Loading report...</div></div>
</div>

<script>
marked.setOptions({ breaks: true, gfm: true });

// marked v9 defaults to no heading ids — add them back via a custom renderer
// so TOC anchor links (#tournament-status etc.) actually resolve on the page.
const renderer = new marked.Renderer();
renderer.heading = function(text, level) {
  // marked HTML-escapes the heading text before this runs (' -> &#39;, & -> &amp;, etc.) —
  // strip those entities first so punctuation vanishes the same way it does in the markdown
  // source, then turn each remaining whitespace char into its own hyphen (no collapsing) to
  // match the slug convention the reports themselves already use (e.g. "News & Injuries" -> "news--injuries").
  const slug = text
    .replace(/&[#\w]+;/g, '')
    .toLowerCase()
    .trim()
    .replace(/[^\w\s-]/g, '')
    .replace(/\s/g, '-');
  return `<h${level} id="${slug}">${text}</h${level}>\n`;
};
marked.setOptions({ renderer });

function getFileParam() {
  return new URLSearchParams(window.location.search).get('file');
}

function markBetBlocks(container) {
  container.querySelectorAll('p').forEach(p => {
    const lead = p.querySelector('strong');
    const label = lead ? lead.textContent.trim() : '';
    if (!/^BET:/.test(label) && !/^Parlay\s*\d/.test(label)) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'bet-block';
    p.parentNode.insertBefore(wrapper, p);
    wrapper.appendChild(p);
    const next = wrapper.nextElementSibling;
    if (next && next.tagName === 'UL') wrapper.appendChild(next);
  });
}

function markToc(container) {
  const firstH2 = container.querySelector('h2');
  if (firstH2 && /contents/i.test(firstH2.textContent)) {
    let next = firstH2.nextElementSibling;
    if (next && next.tagName === 'UL') {
      next.classList.add('toc');
    }
  }
}

async function loadReport() {
  const container = document.getElementById('report-container');
  const fileUrl = getFileParam();
  if (!fileUrl) {
    container.innerHTML = '<div class="error-msg">No report specified. Use <code>?file=&lt;raw markdown URL&gt;</code>.</div>';
    return;
  }
  try {
    const resp = await fetch(fileUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const markdown = await resp.text();
    const html = marked.parse(markdown);
    container.innerHTML = `<div class="report-body">${html}</div>`;
    markBetBlocks(container);
    markToc(container);

    // Intercept all hash anchor clicks inside the report so they scroll
    // smoothly instead of reloading the page (which drops the #fragment
    // before the async content has rendered).
    container.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const id = a.getAttribute('href').slice(1);
        const target = document.getElementById(id);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  } catch (e) {
    container.innerHTML = `<div class="error-msg">
      Could not load report: ${e.message}<br>
      <a href="${fileUrl}" target="_blank">View raw file instead &rarr;</a>
    </div>`;
  }
}

document.addEventListener('DOMContentLoaded', loadReport);
</script>
</body>
</html>

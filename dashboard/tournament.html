<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Tournament Tracker</title>
<style>
  :root {
    --bg-base: #0d1117;
    --bg-card: #161b22;
    --bg-item: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #6e7681;
    --accent-blue: #58a6ff;
    --accent-green: #00c853;
    --accent-red: #f85149;
    --accent-amber: #ffab00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-base); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
  a { color: var(--accent-blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Header ── */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-title { color: #fff; font-size: 16px; font-weight: 700; }
  /* ── Page Toggle ── */
  .page-toggle {
    display: inline-flex;
    background: var(--bg-item);
    border-radius: 8px;
    padding: 2px;
    gap: 2px;
  }
  .page-toggle a {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    color: var(--text-muted);
    transition: color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .page-toggle a:hover { color: var(--text-primary); }
  .page-toggle a.active { background: #1f6feb; color: #fff; }
  .page-toggle svg { flex-shrink: 0; }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .view-toggle button {
    background: var(--bg-item);
    border: none;
    color: var(--text-muted);
    padding: 6px 16px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  .view-toggle button.active { background: #1f6feb; color: #fff; }
  .refresh-btn {
    background: var(--bg-item);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 4px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 13px;
  }
  .refresh-btn:hover { background: var(--border); }
  #last-updated { font-size: 12px; color: var(--text-dim); }

  /* ── Groups Grid ── */
  #groups-view { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .group-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .group-header {
    background: var(--bg-item);
    padding: 8px 12px;
    font-weight: 700;
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  table.standings { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.standings th { padding: 4px 4px; color: var(--text-dim); font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--bg-item); }
  table.standings td { padding: 5px 4px; border-bottom: 1px solid var(--bg-item); }
  table.standings tr:last-child td { border-bottom: none; }

  .qual-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .qual-through { background: var(--accent-green); }
  .qual-contention { background: var(--accent-amber); }
  .qual-eliminated { background: var(--accent-red); }
  .qual-unknown { background: var(--border); }

  /* ── Bracket ── */
  #bracket-view { padding: 16px; display: none; overflow-x: auto; }
  .bracket-container { display: flex; gap: 0; min-width: 1600px; align-items: stretch; }
  .bracket-round {
    display: flex;
    flex-direction: column;
    min-width: 160px;
    align-items: stretch;
  }
  .bracket-round-title {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 7px 4px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .bracket-round-title.rt-r32  { color: #58a6ff; }
  .bracket-round-title.rt-r16  { color: #a371f7; }
  .bracket-round-title.rt-qf   { color: #f78166; }
  .bracket-round-title.rt-sf   { color: #ff9900; }
  .bracket-round-title.rt-final{ color: var(--accent-amber); }

  .bracket-match { margin: 4px; }
  .bracket-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    min-width: 148px;
  }
  .bracket-slot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    border-bottom: 1px solid var(--bg-item);
  }
  .bracket-slot:last-of-type { border-bottom: none; }
  .bracket-slot.tbd { color: var(--text-dim); font-style: italic; font-weight: 400; }
  .bracket-slot.winner {
    background: rgba(0, 200, 83, 0.09);
    color: #00e676;
    font-weight: 700;
  }
  .bracket-slot.loser { color: var(--text-dim); font-weight: 400; }
  .bracket-slot-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bracket-flag { font-size: 13px; margin-right: 4px; }
  .bracket-rank { font-size: 10px; color: var(--text-dim); margin-left: 4px; font-variant-numeric: tabular-nums; }
  .bracket-slot-score {
    font-size: 12px;
    font-weight: 700;
    min-width: 12px;
    text-align: right;
    color: var(--text-primary);
  }
  .bracket-slot-score.winning { color: #00e676; }
  .bracket-slot-score.losing  { color: var(--text-dim); }
  .bracket-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 10px;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--bg-base);
    border-top: 1px solid var(--bg-item);
  }
  .final-header {
    background: #1f2937;
    border: 2px solid var(--accent-amber);
    color: var(--accent-amber);
    font-weight: 700;
    text-align: center;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 6px;
  }

  /* ── Error / Loading ── */
  .loading { color: var(--text-dim); font-style: italic; padding: 20px; }
  .error-state {
    padding: 20px;
    color: var(--accent-red);
    font-size: 13px;
    background: rgba(248, 81, 73, 0.08);
    border-radius: 6px;
    margin: 16px;
  }
  .error-state button {
    margin-top: 8px;
    background: var(--bg-item);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 12px;
    display: block;
  }

  /* ── Group Schedule ── */
  #group-schedule { padding: 0 16px 24px; }
  #group-schedule .sched-title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 10px; }
  #group-schedule .sched-day { font-size: 12px; font-weight: 700; color: var(--accent-blue); margin: 16px 0 6px; }
  #group-schedule table.sched { width: 100%; border-collapse: collapse; font-size: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  #group-schedule table.sched th { text-align: left; padding: 6px 10px; color: var(--text-dim); font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--bg-item); }
  #group-schedule table.sched td { padding: 6px 10px; border-bottom: 1px solid var(--bg-item); color: var(--text-primary); white-space: nowrap; }
  #group-schedule table.sched tr:last-child td { border-bottom: none; }
  #group-schedule .sched-score { color: var(--accent-green); font-weight: 600; }
  #group-schedule .sched-upcoming { color: var(--text-dim); }
  #group-schedule .matchday-header {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 18px 0 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .matchday-filter { display: flex; gap: 6px; margin: 8px 0 14px; }
  .md-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-item);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .md-btn.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
  .md-btn:hover:not(.active) { background: var(--border); color: var(--text-primary); }

  @media (max-width: 600px) {
    #groups-view { grid-template-columns: 1fr; padding: 10px; }
  }
</style>
</head>

<script>
// ── Data source ───────────────────────────────────────────────────────────────
const OPENFOOTBALL_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

// Flag emoji map for display — data only, not UI chrome.
// For teams not listed, falls back to empty string.
const TEAM_FLAGS = {
  'Mexico': '🇲🇽', 'South Africa': '🇿🇦', 'South Korea': '🇰🇷', 'Czech Republic': '🇨🇿',
  'Canada': '🇨🇦', 'Bosnia & Herzegovina': '🇧🇦', 'Qatar': '🇶🇦', 'Switzerland': '🇨🇭',
  'Brazil': '🇧🇷', 'Morocco': '🇲🇦', 'Haiti': '🇭🇹', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'USA': '🇺🇸', 'Paraguay': '🇵🇾', 'Australia': '🇦🇺', 'Turkey': '🇹🇷',
  'Germany': '🇩🇪', 'Curaçao': '🇨🇼', 'Ivory Coast': '🇨🇮', 'Ecuador': '🇪🇨',
  'Netherlands': '🇳🇱', 'Japan': '🇯🇵', 'Sweden': '🇸🇪', 'Tunisia': '🇹🇳',
  'Belgium': '🇧🇪', 'Egypt': '🇪🇬', 'Iran': '🇮🇷', 'New Zealand': '🇳🇿',
  'Spain': '🇪🇸', 'Cape Verde': '🇨🇻', 'Saudi Arabia': '🇸🇦', 'Uruguay': '🇺🇾',
  'France': '🇫🇷', 'Senegal': '🇸🇳', 'Iraq': '🇮🇶', 'Norway': '🇳🇴',
  'Argentina': '🇦🇷', 'Algeria': '🇩🇿', 'Austria': '🇦🇹', 'Jordan': '🇯🇴',
  'Portugal': '🇵🇹', 'DR Congo': '🇨🇩', 'Congo DR': '🇨🇩', 'Uzbekistan': '🇺🇿', 'Colombia': '🇨🇴',
  'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Croatia': '🇭🇷', 'Ghana': '🇬🇭', 'Panama': '🇵🇦',
};

// Pre-tournament FIFA World Ranking (final ranking heading into WC2026).
// Italy (#12) is absent — they did not qualify.
const TEAM_RANKINGS = {
  'France': 1, 'Spain': 2, 'Argentina': 3, 'England': 4, 'Portugal': 5,
  'Brazil': 6, 'Netherlands': 7, 'Morocco': 8, 'Belgium': 9, 'Germany': 10,
  'Croatia': 11, 'Colombia': 13, 'Senegal': 14, 'Mexico': 15, 'USA': 16,
  'Uruguay': 17, 'Japan': 18, 'Switzerland': 19, 'Iran': 21, 'Turkey': 22,
  'Ecuador': 23, 'Austria': 24, 'South Korea': 25, 'Australia': 27, 'Algeria': 28,
  'Egypt': 29, 'Canada': 30, 'Norway': 31, 'Panama': 33, 'Ivory Coast': 34,
  'Sweden': 38, 'Paraguay': 40, 'Czech Republic': 41, 'Scotland': 43, 'Tunisia': 44,
  'DR Congo': 46, 'Uzbekistan': 50, 'Qatar': 55, 'Iraq': 57, 'South Africa': 60,
  'Saudi Arabia': 61, 'Jordan': 63, 'Bosnia & Herzegovina': 65, 'Cape Verde': 69,
  'Ghana': 74, 'Curaçao': 82, 'Haiti': 83, 'New Zealand': 85,
};

// Stadium name for each openfootball `ground` (city) value used in group-stage matches.
const VENUE_STADIUMS = {
  'Atlanta': 'Mercedes-Benz Stadium',
  'Boston (Foxborough)': 'Gillette Stadium',
  'Dallas (Arlington)': 'AT&T Stadium',
  'Guadalajara (Zapopan)': 'Estadio Akron',
  'Houston': 'NRG Stadium',
  'Kansas City': 'Arrowhead Stadium',
  'Los Angeles (Inglewood)': 'SoFi Stadium',
  'Mexico City': 'Estadio Azteca',
  'Miami (Miami Gardens)': 'Hard Rock Stadium',
  'Monterrey (Guadalupe)': 'Estadio BBVA',
  'New York/New Jersey (East Rutherford)': 'MetLife Stadium',
  'Philadelphia': 'Lincoln Financial Field',
  'San Francisco Bay Area (Santa Clara)': "Levi's Stadium",
  'Seattle': 'Lumen Field',
  'Toronto': 'BMO Field',
  'Vancouver': 'BC Place',
};

const VENUE_CITY = {
  'Atlanta': 'Atlanta',
  'Boston (Foxborough)': 'Boston',
  'Dallas (Arlington)': 'Dallas',
  'Guadalajara (Zapopan)': 'Guadalajara',
  'Houston': 'Houston',
  'Kansas City': 'Kansas City',
  'Los Angeles (Inglewood)': 'Los Angeles',
  'Mexico City': 'Mexico City',
  'Miami (Miami Gardens)': 'Miami',
  'Monterrey (Guadalupe)': 'Monterrey',
  'New York/New Jersey (East Rutherford)': 'New York',
  'Philadelphia': 'Philadelphia',
  'San Francisco Bay Area (Santa Clara)': 'San Francisco',
  'Seattle': 'Seattle',
  'Toronto': 'Toronto',
  'Vancouver': 'Vancouver',
};

// Knockout round labels as they appear in openfootball data
const KO_ROUND_LABELS = {
  'Round of 32': { id: 'r32', matches: 16 },
  'Round of 16': { id: 'r16', matches: 8 },
  'Quarter-final': { id: 'qf', matches: 4 },
  'Semi-final': { id: 'sf', matches: 2 },
  'Final': { id: 'final', matches: 1 },
  'Match for third place': { id: 'third', matches: 1 },
};

const BRACKET_ROUNDS = [
  { id: 'r32', label: 'Round of 32', matches: 16 },
  { id: 'r16', label: 'Round of 16', matches: 8 },
  { id: 'qf', label: 'Quarter-Finals', matches: 4 },
  { id: 'sf', label: 'Semi-Finals', matches: 2 },
  { id: 'final', label: 'Final', matches: 1 },
];

// ── State ─────────────────────────────────────────────────────────────────────
let allMatches = [];   // raw from openfootball
let groupMap = {};     // { 'Group A': ['Mexico', 'South Africa', ...], ... }
let bracketData = {};  // { r32: [{team1, team2, score}], ... }

// ── Fetch & Parse ─────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('last-updated').textContent = 'Loading...';
  document.getElementById('groups-view').innerHTML = '<div class="loading">Loading group standings...</div>';

  try {
    const resp = await fetch(OPENFOOTBALL_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    allMatches = data.matches || [];
    if (!allMatches.length) throw new Error('No match data in response');

    buildGroupMap();
    buildBracketData();

    const timeStr = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('last-updated').textContent = `Updated from openfootball: ${timeStr}`;

    renderGroups();
    if (document.getElementById('bracket-view').style.display !== 'none') {
      renderBracket();
    }
  } catch (e) {
    const errHTML = `<div class="error-state">
      Tournament data unavailable: ${e.message}<br>
      <button onclick="loadData()">Retry</button>
    </div>`;
    document.getElementById('groups-view').innerHTML = errHTML;
    document.getElementById('bracket-view').innerHTML = errHTML;
    document.getElementById('last-updated').textContent = 'Failed to load';
  }
}

function buildGroupMap() {
  groupMap = {};
  for (const m of allMatches) {
    const grp = m.group;
    if (!grp) continue;
    if (!groupMap[grp]) groupMap[grp] = new Set();
    groupMap[grp].add(m.team1);
    groupMap[grp].add(m.team2);
  }
  // Convert sets to arrays, sort alphabetically for stability
  for (const grp of Object.keys(groupMap)) {
    groupMap[grp] = [...groupMap[grp]].sort();
  }
}

function buildBracketData() {
  bracketData = {};
  const koMatches = allMatches.filter(m => !m.group).sort((a, b) => (a.num || 999) - (b.num || 999));
  bracketData._byNum = {};
  for (const m of koMatches) {
    if (!m.num) continue;
    const roundInfo = KO_ROUND_LABELS[m.round];
    if (!roundInfo) continue;
    const { id } = roundInfo;
    if (!bracketData[id]) bracketData[id] = [];
    const ft = m.score?.ft;
    const et = m.score?.et;
    const pk = m.score?.p;
    const played = Array.isArray(ft);
    let winner = null;
    let wentToPK = false;
    if (played) {
      if (ft[0] > ft[1]) winner = m.team1;
      else if (ft[1] > ft[0]) winner = m.team2;
      else if (Array.isArray(et) && et[0] !== et[1]) {
        winner = et[0] > et[1] ? m.team1 : m.team2;
      } else if (Array.isArray(pk)) {
        wentToPK = true;
        if (pk[0] > pk[1]) winner = m.team1;
        else if (pk[1] > pk[0]) winner = m.team2;
      }
    }
    const entry = {
      num: m.num,
      team1: m.team1 || 'TBD',
      team2: m.team2 || 'TBD',
      score: played ? `${ft[0]}–${ft[1]}` : null,
      pkScore: wentToPK ? `${pk[0]}–${pk[1]}` : null,
      winner,
      ground: m.ground || null,
      date: m.date || null,
      time: m.time || null,
    };
    bracketData[id].push(entry);
    bracketData._byNum[m.num] = entry;
  }

  // Second pass: resolve "W74"-style placeholders into actual winner names.
  // openfootball sometimes lags on filling these in for future rounds even
  // after the feeder match is decided (especially PK-decided games), so
  // resolve locally using winners we already computed above.
  const byNum = bracketData._byNum;
  function resolvePlaceholder(name) {
    const match = typeof name === 'string' && name.match(/^W(\d+)$/);
    if (!match) return name;
    const feederNum = parseInt(match[1], 10);
    const feeder = byNum[feederNum];
    return feeder?.winner || name;
  }
  for (const num of Object.keys(byNum)) {
    const entry = byNum[num];
    entry.team1 = resolvePlaceholder(entry.team1);
    entry.team2 = resolvePlaceholder(entry.team2);
  }
}

// ── Standings Computation ─────────────────────────────────────────────────────
function computeStandings(groupName) {
  const tally = {};

  for (const m of allMatches) {
    if (m.group !== groupName) continue;
    const ft = m.score?.ft;
    if (!Array.isArray(ft)) continue; // unplayed

    const [g1, g2] = ft;
    const t1 = m.team1, t2 = m.team2;

    if (!tally[t1]) tally[t1] = { p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 };
    if (!tally[t2]) tally[t2] = { p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 };

    tally[t1].p++; tally[t1].gf += g1; tally[t1].ga += g2;
    tally[t2].p++; tally[t2].gf += g2; tally[t2].ga += g1;

    if (g1 > g2) { tally[t1].w++; tally[t2].l++; }
    else if (g1 < g2) { tally[t2].w++; tally[t1].l++; }
    else { tally[t1].d++; tally[t2].d++; }
  }

  // Ensure every team in the group appears even with 0 matches played
  for (const name of (groupMap[groupName] || [])) {
    if (!tally[name]) tally[name] = { p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 };
  }

  return Object.entries(tally).map(([name, s]) => ({
    name,
    flag: TEAM_FLAGS[name] || '',
    rank: TEAM_RANKINGS[name] ?? null,
    p: s.p, w: s.w, d: s.d, l: s.l,
    gf: s.gf, ga: s.ga,
    gd: s.gf - s.ga,
    pts: s.w * 3 + s.d,
  })).sort((a, b) =>
    // Real WC tiebreakers also use head-to-head; pts/GD/GF is the standard approximation
    b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name)
  );
}

// ── Qualification Status ──────────────────────────────────────────────────────
function qualStatus(rank, pts, played, totalTeams) {
  if (played === 0) return 'unknown';
  // After all 3 matchdays the top 2 qualify automatically
  if (rank <= 2 && played >= 2) return 'through';
  if (rank <= 2) return 'contention';
  if (played >= 2 && pts === 0) return 'eliminated';
  return 'contention';
}

// ── Render Groups ─────────────────────────────────────────────────────────────
function renderGroups() {
  const container = document.getElementById('groups-view');
  const sortedGroups = Object.keys(groupMap).sort(); // Group A, B, ... L
  let html = '';

  for (const grpName of sortedGroups) {
    const rows = computeStandings(grpName);
    const letter = grpName.replace('Group ', '');

    html += `<div class="group-card">
      <div class="group-header">${grpName}</div>
      <table class="standings">
        <thead><tr>
          <th style="width:14px"></th>
          <th style="text-align:left">Team</th>
          <th style="width:22px" title="Wins">W</th>
          <th style="width:22px" title="Draws">D</th><th style="width:22px" title="Losses">L</th>
          <th style="width:28px" title="Goal Difference">GD</th><th style="width:26px" title="Points">Pts</th>
        </tr></thead>
        <tbody>`;

    rows.forEach((t, idx) => {
      const pos = idx + 1;
      const status = qualStatus(pos, t.pts, t.p, rows.length);
      const flagStr = t.flag ? `<span style="font-size:15px;margin-right:4px">${t.flag}</span>` : '';
      const rankStr = t.rank ? `<span style="color:var(--text-dim);font-size:11px;margin-right:5px;font-variant-numeric:tabular-nums">#${t.rank}</span>` : '';
      html += `<tr>
        <td><span class="qual-dot qual-${status}"></span></td>
        <td><span style="white-space:nowrap">${rankStr}${flagStr}<span style="font-weight:500;color:var(--text-primary)">${t.name}</span></span></td>
        <td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gd >= 0 ? '+' : ''}${t.gd}</td>
        <td style="font-weight:700;color:var(--text-primary)">${t.pts}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  }

  container.innerHTML = html || '<div class="loading">No group data available yet.</div>';
  renderGroupSchedule();
}

// Parses openfootball's "HH:MM UTC±N" venue-local time string and returns
// the kickoff formatted in US Eastern Time, e.g. "10:00 PM ET (7:00 PM CT)".
function fmtVenueTimeToET(timeStr, dateStr) {
  if (!timeStr || !dateStr) return timeStr || 'TBD';
  const m = timeStr.match(/^(\d{1,2}):(\d{2})\s*UTC([+-]\d+)$/);
  if (!m) return timeStr; // fallback: show raw string rather than break
  const [, hh, mm, offset] = m;
  // Build a true UTC instant: venue local time minus the venue's UTC offset.
  const utcMs = Date.UTC(
    ...dateStr.split('-').map(Number).map((v, i) => i === 1 ? v - 1 : v),
    Number(hh) - Number(offset), Number(mm)
  );
  const d = new Date(utcMs);
  const et = d.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' });
  const ct = d.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit' });
  return `${et} ET / ${ct} CT`;
}

function renderGroupSchedule() {
  const container = document.getElementById('group-schedule');
  const games = allMatches.filter(m => m.group);
  if (!games.length) { container.innerHTML = ''; return; }

  const byDate = {};
  for (const m of games) {
    (byDate[m.date] = byDate[m.date] || []).push(m);
  }
  const dates = Object.keys(byDate).sort();

  // Matchday is determined by global tournament date range, not per-group position:
  // MD1 = June 11-17 (each group's first pair of games)
  // MD2 = June 18-23 (each group's second pair of games)
  // MD3 = June 24-27 (each group's third pair of games, simultaneous within group)
  function getMatchday(m) {
    if (!m.date) return null;
    if (m.date <= '2026-06-17') return 1;
    if (m.date <= '2026-06-23') return 2;
    return 3;
  }

  let html = `<div class="sched-title">Group Stage Schedule</div>
    <div class="matchday-filter" id="matchday-filter">
      <button class="md-btn active" data-md="all">All</button>
      <button class="md-btn" data-md="1">Matchday 1</button>
      <button class="md-btn" data-md="2">Matchday 2</button>
      <button class="md-btn" data-md="3">Matchday 3</button>
    </div>`;

  let currentMatchday = null;
  for (const d of dates) {
    const rows = byDate[d].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
    const md = getMatchday(rows[0]);
    if (md && md !== currentMatchday) {
      currentMatchday = md;
      html += `<div class="matchday-header" data-matchday="${md}">Matchday ${md}</div>`;
    }
    const dayLabel = new Date(d + 'T12:00:00Z').toLocaleDateString('en-US',
      { weekday: 'long', month: 'long', day: 'numeric', timeZone: 'UTC' });
    html += `<div class="sched-section" data-matchday="${md || ''}">
      <div class="sched-day">${dayLabel}</div>
      <table class="sched">
        <thead><tr><th>Time</th><th>Match</th><th>Group</th><th>Location</th><th>Result</th></tr></thead>
        <tbody>`;
    for (const m of rows) {
      const f1 = TEAM_FLAGS[m.team1] || '', f2 = TEAM_FLAGS[m.team2] || '';
      const ft = m.score?.ft;
      const result = Array.isArray(ft)
        ? `<span class="sched-score">${ft[0]}–${ft[1]}</span>`
        : `<span class="sched-upcoming">—</span>`;
      html += `<tr>
        <td>${fmtVenueTimeToET(m.time, m.date)}</td>
        <td>${f1} ${m.team1} v ${f2} ${m.team2}</td>
        <td>${m.group || ''}</td>
        <td>${m.ground ? `${m.ground} — ${VENUE_STADIUMS[m.ground] || ''}`.replace(/ — $/, '') : 'TBD'}</td>
        <td>${result}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }
  container.innerHTML = html;

  document.querySelectorAll('.md-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.md-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const selected = btn.dataset.md;
      document.querySelectorAll('.sched-section').forEach(section => {
        section.style.display =
          selected === 'all' || section.dataset.matchday === selected
            ? '' : 'none';
      });
      document.querySelectorAll('.matchday-header').forEach(h => {
        h.style.display =
          selected === 'all' || h.dataset.matchday === selected ? '' : 'none';
      });
    });
  });
}

// ── Render Bracket ────────────────────────────────────────────────────────────
function renderBracket() {
  const container = document.getElementById('bracket-view');

  function teamDisplay(name) {
    if (!name || name === 'TBD') return name;
    const flag = TEAM_FLAGS[name] || '';
    const rank = TEAM_RANKINGS[name] ? `<span class="bracket-rank">#${TEAM_RANKINGS[name]}</span>` : '';
    const flagHtml = flag ? `<span class="bracket-flag">${flag}</span>` : '';
    return `${flagHtml}${name}${rank ? ' ' + rank : ''}`;
  }

  // Helper: render a single match card
  function matchCard(m) {
    const t1 = m?.team1 || 'TBD';
    const t2 = m?.team2 || 'TBD';
    const score = m?.score || null;
    const winner = m?.winner || null;
    const stadiumName = m?.ground ? (VENUE_STADIUMS[m.ground] || m.ground) : null;
    const cityName = m?.ground ? (VENUE_CITY[m.ground] || null) : null;
    const venue = stadiumName ? (cityName ? `${stadiumName} · ${cityName}` : stadiumName) : null;
    const dateLabel = m?.date ? new Date(m.date + 'T12:00:00Z').toLocaleDateString('en-US',
      { month: 'short', day: 'numeric', timeZone: 'UTC' }) : null;
    const scored = score !== null;
    const sc = scored ? score.split('–') : [null, null];
    const s1 = t1 === 'TBD' ? 'tbd' : winner ? (t1 === winner ? 'winner' : 'loser') : '';
    const s2 = t2 === 'TBD' ? 'tbd' : winner ? (t2 === winner ? 'winner' : 'loser') : '';
    const sc1cls = scored ? (t1 === winner ? 'winning' : 'losing') : '';
    const sc2cls = scored ? (t2 === winner ? 'winning' : 'losing') : '';
    const pkLabel = m?.pkScore ? ` <span class="bracket-pk">(${m.pkScore} PK)</span>` : '';
    const footer = (dateLabel || venue) ? `<div class="bracket-footer">
      <span>${dateLabel || ''}${pkLabel}</span>
      <span>${venue || ''}</span>
    </div>` : '';
    return `<div class="bracket-match"><div class="bracket-card">
      <div class="bracket-slot ${s1}">
        <span class="bracket-slot-name">${teamDisplay(t1)}</span>
        ${scored ? `<span class="bracket-slot-score ${sc1cls}">${sc[0]}</span>` : ''}
      </div>
      <div class="bracket-slot ${s2}">
        <span class="bracket-slot-name">${teamDisplay(t2)}</span>
        ${scored ? `<span class="bracket-slot-score ${sc2cls}">${sc[1]}</span>` : ''}
      </div>
      ${footer}
    </div></div>`;
  }

  const RT_CLASS = {
    'Round of 32': 'rt-r32', 'Round of 16': 'rt-r16',
    'Quarter-Finals': 'rt-qf', 'Semi-Finals': 'rt-sf', 'Final': 'rt-final'
  };

  // Helper: render a round column (title + evenly spaced matches)
  function roundColumn(label, matches) {
    const cards = matches.map(m => matchCard(m)).join('');
    const cls = RT_CLASS[label] || '';
    return `<div class="bracket-round">
      <div class="bracket-round-title ${cls}">${label}</div>
      <div style="display:flex;flex-direction:column;justify-content:space-around;flex:1">${cards}</div>
    </div>`;
  }

  // Helper: connector column — dir is 'right' (border-right) or 'left' (border-left)
  function connectorCol(count, dir) {
    const borderSide = dir === 'left' ? 'border-left' : 'border-right';
    const seg = `<div style="flex:1;display:flex;flex-direction:column;justify-content:center">` +
      `<div style="height:50%;border-top:1px solid #30363d;${borderSide}:1px solid #30363d"></div>` +
      `<div style="height:50%;border-bottom:1px solid #30363d;${borderSide}:1px solid #30363d"></div>` +
      `</div>`;
    const segs = Array(count).fill(seg).join('');
    return `<div style="display:flex;flex-direction:column;align-items:stretch;width:24px;align-self:stretch">${segs}</div>`;
  }

  const bn = bracketData._byNum || {};
  const n = (id) => bn[id] || { team1: 'TBD', team2: 'TBD', score: null, winner: null, ground: null, date: null, time: null };

  // Left half: G74+G77→G89, G73+G75→G90, G76+G78→G91, G79+G80→G92 → QF G97-98 → SF G101
  const leftR32  = [74, 77, 73, 75, 76, 78, 79, 80].map(n);
  // Right half: G83+G84→G93, G81+G82→G94, G86+G88→G95, G85+G87→G96 → QF G99-100 → SF G102
  const rightR32 = [83, 84, 81, 82, 86, 88, 85, 87].map(n);
  const leftR16  = [89, 90, 91, 92].map(n);
  const rightR16 = [93, 94, 95, 96].map(n);
  const leftQF   = [97, 98].map(n);
  const rightQF  = [99, 100].map(n);
  const leftSF   = [n(101)];
  const rightSF  = [n(102)];

  // Final card
  const fm = n(104);
  const ft1 = fm?.team1 || 'TBD';
  const ft2 = fm?.team2 || 'TBD';
  const fscore = fm?.score || null;
  const fwinner = fm?.winner || null;
  const fStadium = fm?.ground ? (VENUE_STADIUMS[fm.ground] || fm.ground) : null;
  const fCity = fm?.ground ? (VENUE_CITY[fm.ground] || null) : null;
  const fvenue = fStadium ? (fCity ? `${fStadium} · ${fCity}` : fStadium) : null;
  const fkickoff = (fm?.time && fm?.date) ? fmtVenueTimeToET(fm.time, fm.date) : null;
  const fdateLabel = fm?.date ? new Date(fm.date + 'T12:00:00Z').toLocaleDateString('en-US',
    { month: 'short', day: 'numeric', timeZone: 'UTC' }) : null;
  const fscored = fscore !== null;
  const fsc = fscored ? fscore.split('–') : [null, null];
  const fs1 = ft1 === 'TBD' ? 'tbd' : fwinner ? (ft1 === fwinner ? 'winner' : 'loser') : '';
  const fs2 = ft2 === 'TBD' ? 'tbd' : fwinner ? (ft2 === fwinner ? 'winner' : 'loser') : '';
  const fsc1cls = fscored ? (ft1 === fwinner ? 'winning' : 'losing') : '';
  const fsc2cls = fscored ? (ft2 === fwinner ? 'winning' : 'losing') : '';

  const finalCol = `<div class="bracket-round" style="min-width:170px;align-items:center;justify-content:center">
    <div class="bracket-round-title rt-final" style="width:100%">Final</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin:auto;padding:8px 0">
      <div class="final-header">FINAL</div>
      <div class="bracket-match" style="margin-top:6px"><div class="bracket-card" style="min-width:150px">
        <div class="bracket-slot ${fs1}">
          <span class="bracket-slot-name">${teamDisplay(ft1)}</span>
          ${fscored ? `<span class="bracket-slot-score ${fsc1cls}">${fsc[0]}</span>` : ''}
        </div>
        <div class="bracket-slot ${fs2}">
          <span class="bracket-slot-name">${teamDisplay(ft2)}</span>
          ${fscored ? `<span class="bracket-slot-score ${fsc2cls}">${fsc[1]}</span>` : ''}
        </div>
        ${(fdateLabel || fvenue) ? `<div class="bracket-footer"><span>${fdateLabel||''}</span><span>${fvenue||''}</span></div>` : ''}
      </div></div>
    </div>
  </div>`;

  let html = '<div class="bracket-container" style="align-items:stretch">';

  // LEFT SIDE: R32 → R16 → QF → SF (connectors point right)
  html += roundColumn('Round of 32', leftR32);
  html += connectorCol(4, 'right');
  html += roundColumn('Round of 16', leftR16);
  html += connectorCol(2, 'right');
  html += roundColumn('Quarter-Finals', leftQF);
  html += connectorCol(1, 'right');
  html += roundColumn('Semi-Finals', leftSF);
  html += connectorCol(1, 'right');

  // CENTER: Final
  html += finalCol;

  // RIGHT SIDE: SF → QF → R16 → R32 (connectors point left, mirrored order)
  html += connectorCol(1, 'left');
  html += roundColumn('Semi-Finals', rightSF);
  html += connectorCol(2, 'left');
  html += roundColumn('Quarter-Finals', rightQF);
  html += connectorCol(4, 'left');
  html += roundColumn('Round of 16', rightR16);
  html += connectorCol(4, 'left');
  html += roundColumn('Round of 32', rightR32);

  html += '</div>';
  container.innerHTML = html;
}

// ── View Switching ─────────────────────────────────────────────────────────────
function showView(view) {
  document.getElementById('groups-view').style.display = view === 'groups' ? 'grid' : 'none';
  document.getElementById('group-schedule').style.display = view === 'groups' ? 'block' : 'none';
  document.getElementById('bracket-view').style.display = view === 'bracket' ? 'block' : 'none';
  document.getElementById('btn-groups').className = view === 'groups' ? 'active' : '';
  document.getElementById('btn-bracket').className = view === 'bracket' ? 'active' : '';
  if (view === 'bracket') renderBracket();
}

document.addEventListener('DOMContentLoaded', () => loadData());
